services:
  - type: web
    name: shl-assessment-recommender
    env: docker
    dockerfilePath: Dockerfile
    plan: free
    region: oregon
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: LLM_MODEL
        value: gemini-2.0-flash
      - key: LLM_TEMPERATURE
        value: "0.2"
      - key: LOG_LEVEL
        value: INFO
      - key: PORT
        value: "8000"
      - key: HOST
        value: "0.0.0.0"
